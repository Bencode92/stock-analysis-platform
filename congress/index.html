<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Politician Portfolio — TradePulse</title>
<style>
  :root{
    --bg:#0a0c12; --card:#12151f; --card2:#171b28; --line:#232838;
    --txt:#e8ecf6; --muted:#8b93a7; --accent:#34d8a4; --accent2:#5b8cff;
    --dem:#5b8cff; --rep:#ff6b6b; --ind:#b98bff; --warn:#ffcf5b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#1a2030 0%,var(--bg) 60%);
       color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       min-height:100vh;padding:32px 16px}
  .wrap{max-width:1100px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  h1{font-size:26px;margin:0;letter-spacing:-.4px}
  h1 .sub{display:block;font-size:13px;color:var(--muted);font-weight:400;margin-top:4px}
  .badge{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
         border-radius:999px;padding:6px 12px;font-size:13px;color:var(--muted);text-decoration:none}
  .badge img{height:18px;display:block}
  .meta{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;min-width:130px}
  .stat .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat .v{font-size:20px;font-weight:600;margin-top:2px}
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .controls label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer}
  input[type=search]{background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);
         padding:8px 12px;font-size:14px;outline:none;min-width:200px}
  .card{background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--line);
        border-radius:18px;overflow:hidden;backdrop-filter:blur(8px)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
  th:hover{color:var(--txt)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:hover td{background:rgba(255,255,255,.025)}
  .rank{color:var(--muted);font-variant-numeric:tabular-nums}
  .name{font-weight:600}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.Democrat{background:rgba(91,140,255,.15);color:var(--dem)}
  .pill.Republican{background:rgba(255,107,107,.15);color:var(--rep)}
  .pill.Independent{background:rgba(185,139,255,.15);color:var(--ind)}
  .score{font-weight:700}
  .bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:4px;width:80px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .pos{color:var(--accent)} .neg{color:var(--rep)}
  .empty{padding:48px;text-align:center;color:var(--muted)}
  .empty b{color:var(--txt)}
  .empty code{background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--accent)}
  footer{margin-top:22px;color:var(--muted);font-size:12px;text-align:center}
  a{color:var(--accent2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏛️ Smart Politician Portfolio
      <span class="sub">Classement des politiciens par régularité — pipeline Congress (Quiver)</span>
    </h1>
    <a class="badge" href="https://github.com/Bencode92/stock-analysis-platform/actions/workflows/congress-pipeline.yml" target="_blank" rel="noopener">
      Pipeline
      <img alt="status" src="https://github.com/Bencode92/stock-analysis-platform/actions/workflows/congress-pipeline.yml/badge.svg" />
    </a>
  </header>

  <div id="meta" class="meta"></div>

  <div class="controls">
    <input id="q" type="search" placeholder="Filtrer un politicien…" />
    <label><input id="onlyEligible" type="checkbox" checked /> Éligibles seulement</label>
  </div>

  <div class="card">
    <div id="content"><div class="empty">Chargement…</div></div>
  </div>

  <footer>
    Données : Quiver Quantitative · Score = régularité (médiane annuelle + constance + diversité + échantillon) ·
    Entrée horodatée sur la date de déclaration (anti look-ahead).
  </footer>
</div>

<script>
const DATA_URL = "data/politician_leaderboard.json";
let ROWS = [], META = {}, sortKey = "rank", sortDir = 1;

const fmtPct = v => v==null ? "—" : (v>0?"+":"") + Number(v).toFixed(1) + "%";
const fmtNum = v => v==null ? "—" : Number(v).toLocaleString("fr-FR");

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const onlyEl = document.getElementById("onlyEligible").checked;
  let rows = ROWS.filter(r => (!onlyEl || r.eligible) &&
        (!q || (r.representative||"").toLowerCase().includes(q)));

  rows.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    x = x==null?-Infinity:x; y = y==null?-Infinity:y;
    if(typeof x==="string") return sortDir*x.localeCompare(y);
    return sortDir*(x-y);
  });

  const maxScore = Math.max(1, ...ROWS.map(r=>r.regularity_score||0));
  const cols = [
    ["rank","#","num"],["representative","Politicien",""],["party","Parti",""],
    ["regularity_score","Score","num"],["median_annual_excess_return","Médiane excès/SPY","num"],
    ["n_trades","Trades","num"],["n_distinct_tickers","Titres","num"],["n_active_years","Années","num"]
  ];

  if(!rows.length){
    document.getElementById("content").innerHTML = emptyState();
    return;
  }
  let html = "<table><thead><tr>";
  for(const [k,label,cls] of cols)
    html += `<th class="${cls}" data-k="${k}">${label}${sortKey===k?(sortDir>0?" ▲":" ▼"):""}</th>`;
  html += "</tr></thead><tbody>";
  for(const r of rows){
    const med = r.median_annual_excess_return;
    html += `<tr>
      <td class="num rank">${r.rank}</td>
      <td><span class="name">${esc(r.representative)}</span>${r.house?` <span style="color:var(--muted);font-size:12px">· ${r.house==="Senate"?"Sénat":"Chambre"}</span>`:""}</td>
      <td>${r.party?`<span class="pill ${r.party}">${partyFr(r.party)}</span>`:"—"}</td>
      <td class="num"><span class="score">${r.regularity_score?.toFixed(1) ?? "—"}</span>
          <div class="bar"><i style="width:${Math.round(100*(r.regularity_score||0)/maxScore)}%"></i></div></td>
      <td class="num ${med>0?"pos":med<0?"neg":""}">${fmtPct(med)}</td>
      <td class="num">${fmtNum(r.n_trades)}</td>
      <td class="num">${fmtNum(r.n_distinct_tickers)}</td>
      <td class="num">${fmtNum(r.n_active_years)}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  document.getElementById("content").innerHTML = html;
  document.querySelectorAll("th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir = k==="representative"?1:-1;}
    if(k==="rank") sortDir=1;
    render();
  });
}

function emptyState(){
  return `<div class="empty">
    <p>📭 <b>Pas encore de données.</b></p>
    <p>Le pipeline n'a pas encore généré <code>data/politician_leaderboard.json</code>.</p>
    <p>Lance-le : <b>Actions → Congress Portfolio Pipeline → Run workflow</b><br>
    (ou attends le cron quotidien de 06:00 UTC).</p>
  </div>`;
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function partyFr(p){return {Democrat:"Démocrate",Republican:"Républicain",Independent:"Indépendant"}[p]||p;}

function renderMeta(){
  const m = META;
  const el = document.getElementById("meta");
  if(!m.generated_at){ el.innerHTML=""; return; }
  const d = new Date(m.generated_at).toLocaleString("fr-FR");
  el.innerHTML = `
    <div class="stat"><div class="k">Éligibles</div><div class="v">${m.eligible_count ?? "—"}</div></div>
    <div class="stat"><div class="k">Univers</div><div class="v">${m.universe_size ?? "—"}</div></div>
    <div class="stat"><div class="k">Min. trades</div><div class="v">${m.params?.min_trades ?? "—"}</div></div>
    <div class="stat"><div class="k">Généré le</div><div class="v" style="font-size:14px">${d}</div></div>`;
}

fetch(DATA_URL, {cache:"no-store"})
  .then(r => r.ok ? r.json() : Promise.reject(r.status))
  .then(data => { ROWS = data.ranking||[]; META = data.meta||{}; renderMeta(); render(); })
  .catch(()=>{ document.getElementById("content").innerHTML = emptyState(); });

document.getElementById("q").addEventListener("input", render);
document.getElementById("onlyEligible").addEventListener("change", render);
</script>
</body>
</html>
