name: 📊 Update Sectors Data

# ═══════════════════════════════════════════════════════════════════════════════
# GÈRE: Données sectorielles
# SCRIPT: scripts/update_sectors_data_etf.py
# HORAIRES: 
#   - 09:25 Paris (après markets, avant ETF refresh)
#   - 18:10 Paris (après Europe close)
#   - 22:35 Paris (après US close)
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:

  schedule:
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌅 MATIN (09:25 Paris) - après markets (09:20)
    # été: 07:25 UTC | hiver: 08:25 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '25 7 * * 1-5'
    - cron: '25 8 * * 1-5'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # 🇪🇺 POST-EUROPE (18:10 Paris) - après markets (18:05)
    # été: 16:10 UTC | hiver: 17:10 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '10 16 * * 1-5'
    - cron: '10 17 * * 1-5'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # 🇺🇸 POST-US (22:35 Paris) - après markets (22:30)
    # été: 20:35 UTC | hiver: 21:35 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '35 20 * * 1-5'
    - cron: '35 21 * * 1-5'

concurrency:
  # Un groupe PAR workflow : les workflows ne s'annulent plus entre eux.
  # La sécurité anti-conflit de push est assurée par le rebase+retry ci-dessous.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  TWELVE_DATA_API: ${{ secrets.TWELVE_DATA_API }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Gate
  # ═══════════════════════════════════════════════════════════════════════════
  gate:
    runs-on: ubuntu-latest
    outputs:
      session: ${{ steps.detect.outputs.session }}
      should_run: ${{ steps.detect.outputs.should_run }}
      
    steps:
      - name: 🕐 Detect session
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "session=manual" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger"
            exit 0
          fi

          # Trust the cron — derive session from the schedule that fired
          SCHEDULE='${{ github.event.schedule }}'
          case "$SCHEDULE" in
            '25 7 * * 1-5'|'25 8 * * 1-5')   SESSION="morning"     ;;
            '10 16 * * 1-5'|'10 17 * * 1-5') SESSION="post-europe" ;;
            '35 20 * * 1-5'|'35 21 * * 1-5') SESSION="post-us"     ;;
            *) SESSION="unknown" ;;
          esac
          echo "✅ session=$SESSION (from cron: $SCHEDULE)"
          echo "session=$SESSION" >> $GITHUB_OUTPUT
          echo "should_run=true" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Update Sectors
  # ═══════════════════════════════════════════════════════════════════════════
  update-sectors:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Create data directory
        run: mkdir -p data

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twelvedata

      - name: 📊 Update sectors data
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "📊 Session: ${{ needs.gate.outputs.session }}"
          echo "══════════════════════════════════════════════════════════════"
          python scripts/update_sectors_data_etf.py
        continue-on-error: true

      - name: Verify data file
        run: |
          if [ ! -f data/sectors.json ]; then
            echo '{"sectors": {}, "meta": {"timestamp": null}}' > data/sectors.json
          fi
          echo "📋 sectors.json size: $(wc -c < data/sectors.json) bytes"

      - name: 💾 Commit and push
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          
          git add data/sectors.json
          git add data/sectors_etf_mapping.csv 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          SESSION="${{ needs.gate.outputs.session }}"
          TS=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          case "$SESSION" in
            morning)     EMOJI="🌅" ;;
            post-europe) EMOJI="🇪🇺" ;;
            post-us)     EMOJI="🇺🇸" ;;
            *)           EMOJI="📊" ;;
          esac
          
          git commit -m "$EMOJI Sectors [$SESSION] - $TS [skip ci]"
          
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3 4 5; do
            git fetch origin && git rebase "origin/$BRANCH" || git rebase --abort || true
            git push origin "HEAD:$BRANCH" && echo "✅ Push OK" && exit 0
            sleep $((RANDOM%5+2))
          done
          exit 1
