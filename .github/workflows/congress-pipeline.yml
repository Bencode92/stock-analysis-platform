name: Congress Portfolio Pipeline

# Rafraichit le cache des trades + le leaderboard de regularite.
# Secrets requis (deja presents dans le repo) : QUIVERAPI (et TWELVE_DATA_API pour l'etage 4).

on:
  schedule:
    - cron: "0 6 * * *"   # tous les jours 06:00 UTC (les declarations Quiver sont quotidiennes)
  workflow_dispatch: {}    # bouton "Run workflow" pour lancer a la main

permissions:
  contents: write          # necessaire pour recommit les JSON generes

concurrency:
  group: congress-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour pouvoir rebaser avant le push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install quiverquant pandas numpy

      - name: Etage 1 - Fetch Congress trades (Quiver)
        env:
          QUIVERAPI: ${{ secrets.QUIVERAPI }}
        run: python congress/congress_fetch.py

      - name: Etage 1ter - Fetch Executive trades (Trump, a part)
        env:
          QUIVERAPI: ${{ secrets.QUIVERAPI }}
        run: python congress/fetch_executive.py

      - name: Cache des prix Twelve Data
        uses: actions/cache@v4
        with:
          path: congress/data/prices
          key: tw-prices-${{ github.run_id }}
          restore-keys: |
            tw-prices-

      - name: Etage 1bis - Enrichir les rendements (Twelve Data)
        env:
          TWELVE_DATA_API: ${{ secrets.TWELVE_DATA_API }}
          # Plan Ultra : cadence haute -> ~1200 tickers pricés en une run (~2 min).
          # Le handler RateLimit fait backoff propre si jamais on touche un plafond.
          TWELVE_DATA_RATE: "600"
          MAX_NEW_TICKERS: "3000"
          PYTHONUNBUFFERED: "1"   # logs de progression en temps reel
        run: python congress/enrich_returns.py

      - name: Etage 1bis-exec - Enrichir les rendements executifs
        env:
          TWELVE_DATA_API: ${{ secrets.TWELVE_DATA_API }}
          TWELVE_DATA_RATE: "600"
          MAX_NEW_TICKERS: "3000"
          TRADES_FILE: congress/data/executive_trades.json
          PYTHONUNBUFFERED: "1"
        run: python congress/enrich_returns.py

      - name: Etage 2 - Rank politicians (regularite)
        run: python congress/politician_rank.py --top 20

      - name: Etage 3 - Construire le portefeuille (conviction)
        env:
          TOP_K: "15"
          WINDOW_DAYS: "180"
          MAX_WEIGHT: "0.15"
          WEIGHTING: conviction
        run: python congress/congress_portfolio.py

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add congress/data/congress_trades.json congress/data/executive_trades.json congress/data/politician_leaderboard.json congress/data/congress_portfolio.json
          if git diff --staged --quiet; then
            echo "Pas de changement de donnees."
            exit 0
          fi
          git commit -m "chore(congress): refresh trades + leaderboard [skip ci]"
          # main peut avoir avance pendant le run (bot Pages, autres workflows) :
          # on rebase sur la derniere version puis on pousse, avec retry anti-course.
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && { echo "push OK (tentative $i)"; exit 0; }
            echo "Course detectee, nouvelle tentative ($i)…"
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Echec du push apres 5 tentatives." >&2
          exit 1
