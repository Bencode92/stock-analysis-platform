name: 📊 Filter Stocks by Volume

# ═══════════════════════════════════════════════════════════════════════════════
# GÈRE: Filtrage par volume (tous marchés) + enrichissement fondamentaux
# SCRIPT: scripts/stock-filter-by-volume.js
# HORAIRE: 04:00 Paris (nuit, après clôture US)
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Région à traiter'
        required: true
        type: choice
        options: [all, us, europe, asia]
        default: 'all'
      debug:
        description: 'Enable debug mode'
        required: false
        default: '0'

  schedule:
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌙 NUIT (04:00 Paris) - après clôture US
    # été: 02:00 UTC | hiver: 03:00 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '0 2 * * 1-5'
    - cron: '0 3 * * 1-5'

concurrency:
  group: repo-writes-global
  cancel-in-progress: false

permissions:
  contents: write

env:
  TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Gate - fenêtre élargie ±20min pour absorber délais GitHub
  # ═══════════════════════════════════════════════════════════════════════════
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      regions: ${{ steps.detect.outputs.regions }}
      
    steps:
      - name: 🕐 Detect if we should run
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "regions=${{ inputs.region }}" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger: region=${{ inputs.region }}"
            exit 0
          fi
          
          PARIS=$(TZ=Europe/Paris date +%H%M)
          echo "══════════════════════════════════════════════════════════════"
          echo "📍 Paris time: $PARIS"
          echo "══════════════════════════════════════════════════════════════"
          
          # Window: 03:40 - 04:20 Paris (fenêtre élargie ±20min)
          if [ "$PARIS" -ge "0340" ] && [ "$PARIS" -le "0420" ]; then
            echo "🌙 Volume filter window detected"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "regions=all" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Skipped: PARIS=$PARIS not in window (03:40-04:20)"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Filter by Volume
  # ═══════════════════════════════════════════════════════════════════════════
  filter-stocks:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install csv-parse axios

      - name: 📊 Run Stock Filter by Volume
        env:
          DEBUG: ${{ inputs.debug || '0' }}
          DATA_DIR: data
          OUTPUT_DIR: data/filtered
          REGIONS: ${{ needs.gate.outputs.regions }}
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "📊 Running stock-filter-by-volume.js"
          echo "🌍 REGIONS=$REGIONS"
          echo "══════════════════════════════════════════════════════════════"
          
          node scripts/stock-filter-by-volume.js

      - name: Upload filtered data
        uses: actions/upload-artifact@v4
        with:
          name: filtered-stocks-${{ github.run_number }}
          path: data/filtered/**
          retention-days: 7

      - name: 📋 Summary
        run: |
          echo "📂 Filtered files:"
          ls -lh data/filtered/*.csv 2>/dev/null || echo "No CSV files"
          
          echo ""
          echo "📈 Counts:"
          for f in data/filtered/*_filtered.csv; do
            if [ -f "$f" ]; then
              COUNT=$(tail -n +2 "$f" | wc -l)
              echo "  $(basename $f): $COUNT stocks"
            fi
          done
          
          # GitHub Summary
          REGIONS="${{ needs.gate.outputs.regions }}"
          echo "## 📊 Volume Filter Results (REGIONS=$REGIONS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f data/filtered/Actions_US_filtered.csv ]; then
            US_COUNT=$(tail -n +2 data/filtered/Actions_US_filtered.csv | wc -l)
            echo "- 🇺🇸 US: **$US_COUNT** stocks" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f data/filtered/Actions_Europe_filtered.csv ]; then
            EU_COUNT=$(tail -n +2 data/filtered/Actions_Europe_filtered.csv | wc -l)
            echo "- 🇪🇺 Europe: **$EU_COUNT** stocks" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f data/filtered/Actions_Asie_filtered.csv ]; then
            ASIA_COUNT=$(tail -n +2 data/filtered/Actions_Asie_filtered.csv | wc -l)
            echo "- 🌏 Asia: **$ASIA_COUNT** stocks" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 💾 Commit and push
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          
          git add data/filtered/*.csv 2>/dev/null || true
          git add data/fundamentals_cache.json 2>/dev/null || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ Nothing to commit"
            exit 0
          fi
          
          REGIONS="${{ needs.gate.outputs.regions }}"
          TS=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "📊 Volume Filter [$REGIONS] - $TS [skip ci]"
          
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin && git rebase "origin/$BRANCH" || git rebase --abort || true
            git push origin "HEAD:$BRANCH" && echo "✅ Push OK" && exit 0
            sleep $((RANDOM%5+2))
          done
          exit 1
