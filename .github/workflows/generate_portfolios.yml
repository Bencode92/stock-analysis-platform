name: Génération des Portefeuilles v5.3.0 + Market Intelligence + Lombard Ranking + Backtest

on:
  push:
    branches: [ main ]
    paths:
      - actualites.html
      - marche.html
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-portfolios:
    runs-on: ubuntu-latest
    env:
      API_CHAT: ${{ secrets.API_CHAT }}
      OPENAI_API_KEY: ${{ secrets.API_CHAT }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TWELVE_DATA_API: ${{ secrets.TWELVE_DATA_API }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # v5.1.0: Audit collector (none | summary | full)
      DEBUG_AUDIT: summary

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy requests beautifulsoup4 lxml openai pyyaml jsonschema

      # ============= v4.9 RADAR: Deterministic Market Context =============
      - name: 🧹 Clean stale market_context (RADAR v4.9)
        run: |
          echo "🧹 Nettoyage des anciens fichiers market_context..."
          rm -f data/market_context.json
          echo "⏭️ Skip GPT market_context — RADAR déterministe activé"
          echo "📊 Le contexte sera généré par market_sector_radar.py (data-driven)"
          echo ""
          echo "ℹ️  OpenAI est utilisé UNIQUEMENT pour les commentaires (pas le scoring)"
          
      # ============= TURNOVER: Save previous portfolio =============
      - name: 📋 Save previous portfolio for turnover
        run: cp data/portfolios.json data/portfolios_previous.json || true

      - name: 🚀 Exécuter le moteur v5.2.0
        run: |
          # v2.1: Update macro indicators...    

      - name: 🚀 Exécuter le moteur v5.2.0
        run: |
          # v2.1: Update macro indicators (Twelve Data + FRED) before portfolio generation
          echo "📊 Updating macro context..."
          python -m portfolio_engine.update_macro_context || echo "⚠️ Macro update failed — continuing with existing data"
          echo ""
          echo "🚀 Running portfolio engine..."
          python generate_portfolios_v4.py

      # ============= v4.5 NEW: Schema Validation =============
      - name: ✅ Valider le schéma JSON
        run: |
          echo "🔍 Validation du schéma portfolios.json..."
          
          if [ ! -f data/portfolios.json ]; then
            echo "❌ ERREUR: portfolios.json non généré!"
            exit 1
          fi
          
          python scripts/validate_schema.py data/portfolios.json --verbose
          
          VALIDATION_EXIT=$?
          if [ $VALIDATION_EXIT -ne 0 ]; then
            echo "❌ ERREUR: Validation du schéma échouée!"
            exit 1
          fi
          
          echo "✅ Validation du schéma réussie"

      - name: 🧾 Check outputs
        if: always()
        run: |
          echo "== data =="
          ls -lah data || true
          echo "----"
          
          # Market Context
          if [ -f data/market_context.json ]; then
            echo "✅ market_context.json"
            python3 << 'EOF'
          import json
          with open("data/market_context.json") as f:
              ctx = json.load(f)
          model = ctx.get('_meta', {}).get('model', 'unknown')
          mode = ctx.get('_meta', {}).get('mode', 'unknown')
          print(f"   Model: {model}")
          print(f"   Mode: {mode}")
          if model.startswith("radar_"):
              print("   ✅ Contexte RADAR (déterministe)")
          else:
              print("   ⚠️ Contexte non-RADAR détecté!")
          EOF
          else
            echo "⚠️ market_context.json ABSENT (tilts neutres)"
          fi
          
          # v2.1: Market Intelligence Audit
          if ls data/market_intelligence_audit/*.json 1>/dev/null 2>&1; then
            echo "✅ market_intelligence_audit/"
            python3 << 'EOF'
          import json, glob
          for f in sorted(glob.glob("data/market_intelligence_audit/*.json"))[-1:]:
              with open(f) as fh:
                  data = json.load(fh)
              regime = data.get("regime", "?")
              ai = data.get("ai_response", {})
              n_adj = len(ai.get("adjustments", []))
              conf = ai.get("regime_confidence", "?")
              md = data.get("market_data_input", {})
              n_fields = sum(1 for v in md.values() if v and str(v) != "N/A" and str(v) != "None")
              print(f"   Regime: {regime} (confidence {conf}/5)")
              print(f"   Adjustments: {n_adj}")
              print(f"   Market data fields filled: {n_fields}/{len(md)}")
              for w in ai.get("warnings", []):
                  print(f"   ⚠️ {w}")
          EOF
          else
            echo "⚠️ market_intelligence_audit/ ABSENT"
          fi
          
          # Portfolios Global
          if [ -f data/portfolios.json ]; then
            echo "✅ portfolios.json (Global)"
            sha1sum data/portfolios.json || true
          else
            echo "❌ portfolios.json ABSENT"
          fi
          
          # Portfolios EU/US v2.2
          if [ -f data/portfolios_euus.json ]; then
            echo "✅ portfolios_euus.json (EU/US Focus v2.2)"
            python3 << 'EOF'
          import json
          with open("data/portfolios_euus.json") as f:
              data = json.load(f)
          meta = data.get("_meta", {})
          print(f"   EU/US Mode: {meta.get('euus_mode', False)}")
          print(f"   Blocked regions: {meta.get('blocked_regions', [])}")
          for profile in ["Agressif", "Modéré", "Stable"]:
              if profile in data:
                  n_actions = len(data[profile].get("Actions", {}))
                  n_etf = len(data[profile].get("ETF", {}))
                  n_bonds = len(data[profile].get("Obligations", {}))
                  print(f"   {profile}: {n_actions} actions, {n_etf} ETF, {n_bonds} bonds")
          EOF
          else
            echo "⚠️ portfolios_euus.json ABSENT"
          fi
          
          # v4.12.0: Selection Audit
          if [ -f data/selection_audit.json ]; then
            echo "✅ selection_audit.json (v4.12.0)"
            python3 << 'EOF'
          import json
          with open("data/selection_audit.json") as f:
              data = json.load(f)
          summary = data.get("summary", {})
          print(f"   Equities initial: {summary.get('equities_initial', 0)}")
          print(f"   Equities selected: {summary.get('equities_selected', 0)}")
          print(f"   Equities rejected notable: {summary.get('equities_rejected_notable', 0)}")
          print(f"   Filters applied: {summary.get('total_filters_applied', 0)}")
          EOF
          else
            echo "⚠️ selection_audit.json ABSENT"
          fi
          
          # v4.12.1: Selection Explained (TOP caps analysis)
          if [ -f data/selection_explained.json ]; then
            echo "✅ selection_explained.json (v4.12.1)"
            python3 << 'EOF'
          import json
          with open("data/selection_explained.json") as f:
              data = json.load(f)
          summary = data.get("summary", {})
          print(f"   Total universe: {summary.get('total_universe', 0)}")
          print(f"   Total selected: {summary.get('total_selected', 0)}")
          print(f"   Selection rate: {summary.get('selection_rate', 'N/A')}")
          top_caps = data.get("top_caps_by_region", {})
          for region in ["US", "Europe", "Asia"]:
              if region in top_caps:
                  selected = top_caps[region].get("selected_in_top_20", 0)
                  rejection_rate = top_caps[region].get("rejection_rate_top_20", "N/A")
                  print(f"   {region} TOP 20: {selected}/20 selected ({rejection_rate} rejected)")
          EOF
          else
            echo "⚠️ selection_explained.json ABSENT"
          fi
          
          # Backtest results (Global)
          if [ -f data/backtest_results.json ]; then
            echo "✅ backtest_results.json (Global)"
            echo "Comparaison des 3 profils:"
            python3 << 'EOF'
          import json
          with open("data/backtest_results.json") as f:
              data = json.load(f)
          comp = data.get("comparison", {})
          print(f"{'Métrique':<20} | {'Agressif':>12} | {'Modéré':>12} | {'Stable':>12}")
          print("-" * 65)
          for key in ["total_return_pct", "sharpe_ratio", "max_drawdown_pct"]:
              agg = comp.get("Agressif", {}).get(key, "N/A")
              mod = comp.get("Modéré", {}).get(key, "N/A")
              stb = comp.get("Stable", {}).get(key, "N/A")
              print(f"{key:<20} | {str(agg):>12} | {str(mod):>12} | {str(stb):>12}")
          EOF
          else
            echo "⚠️ backtest_results.json ABSENT (TWELVE_DATA_API non configurée?)"
          fi
          
          # Backtest results EU/US
          if [ -f data/backtest_results_euus.json ]; then
            echo "✅ backtest_results_euus.json (EU/US)"
            python3 << 'EOF'
          import json
          with open("data/backtest_results_euus.json") as f:
              data = json.load(f)
          comp = data.get("comparison", {})
          print("EU/US Backtest:")
          for profile in ["Agressif", "Modéré", "Stable"]:
              stats = comp.get(profile, {})
              ret = stats.get("total_return_pct", "N/A")
              vol = stats.get("volatility_pct", "N/A")
              print(f"   {profile}: return={ret}%, vol={vol}%")
          EOF
          else
            echo "⚠️ backtest_results_euus.json ABSENT"
          fi
          
          # v4.9.1: Backtest debug file
          if [ -f data/backtest_debug.json ]; then
            echo "✅ backtest_debug.json (v4.9.1)"
            python3 << 'EOF'
          import json
          with open("data/backtest_debug.json") as f:
              data = json.load(f)
          n_assets = data.get("data_coverage", {}).get("tickers_with_data", 0)
          types = data.get("data_coverage", {}).get("assets_by_type", {})
          print(f"   Actifs documentés: {n_assets}")
          print(f"   Types: {types}")
          EOF
          else
            echo "⚠️ backtest_debug.json ABSENT"
          fi
          
          # v5.1.0: Selection Debug (audit_collector)
          if [ -f data/selection_debug.json ]; then
            echo "✅ selection_debug.json (v5.1.0)"
            python3 << 'EOF'
          import json
          with open("data/selection_debug.json") as f:
              data = json.load(f)
          meta = data.get("meta", {})
          print(f"   Run ID: {meta.get('run_id', 'N/A')}")
          git_sha = meta.get('git_sha', '')
          print(f"   Git SHA: {git_sha[:8] if git_sha else 'N/A'}")
          print(f"   Mode: {meta.get('audit_level', 'N/A')}")
          stages = data.get("pipeline_stages", {})
          for stage_name, stage_data in stages.items():
              before = stage_data.get("before", 0)
              after = stage_data.get("after", 0)
              print(f"   {stage_name}: {before} → {after}")
          EOF
          else
            echo "⚠️ selection_debug.json ABSENT (DEBUG_AUDIT=none?)"
          fi
          
          # v5.3.0: Lombard Ranking
          if [ -f data/lombard_ranking.json ]; then
            echo "✅ lombard_ranking.json (v5.3.0)"
            python3 << 'EOF'
          import json
          with open("data/lombard_ranking.json") as f:
              data = json.load(f)
          meta = data.get("_meta", {})
          print(f"   Universe: {meta.get('universe_size', 0)} stocks")
          print(f"   Eligible: {meta.get('eligible_count', 0)} stocks")
          rankings = data.get("rankings", {})
          for rate, rdata in rankings.items():
              summary = rdata.get("summary", {})
              print(f"   Rate {rate}%: top {rdata.get('count', 0)} | yield={summary.get('avg_yield', 0):.1f}% | carry={summary.get('avg_carry_net', 0):+.1f}%")
          EOF
          else
            echo "⚠️ lombard_ranking.json ABSENT"
          fi
          
          echo "----"
          echo "== portfolio_history =="
          ls -lah data/portfolio_history || true

      - name: 📊 Backtest Summary
        if: always()
        run: |
          echo "## 📊 Portfolio Engine v5.3.0 Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Schema Validation Status
          echo "### ✅ Schema Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f data/portfolios.json ]; then
            if python scripts/validate_schema.py data/portfolios.json 2>/dev/null; then
              echo "| Status | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Status | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Status | ⚠️ No file |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Market Context Summary (RADAR v4.9)
          if [ -f data/market_context.json ]; then
            echo "### 🎯 Market Context (RADAR v4.9)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/market_context.json") as f:
              ctx = json.load(f)
          regime = ctx.get('market_regime', 'N/A')
          conf = ctx.get('confidence', 'N/A')
          tilts = ctx.get('macro_tilts', {})
          fav_sec = ', '.join(tilts.get('favored_sectors', [])) or 'None'
          avoid_sec = ', '.join(tilts.get('avoided_sectors', [])) or 'None'
          fav_reg = ', '.join(tilts.get('favored_regions', [])) or 'None'
          avoid_reg = ', '.join(tilts.get('avoided_regions', [])) or 'None'
          model = ctx.get('_meta', {}).get('model', 'unknown')
          is_radar = '✅ RADAR' if model.startswith('radar_') else '⚠️ non-RADAR'
          is_fb = '⚠️ FALLBACK' if ctx.get('_meta', {}).get('is_fallback') else ''
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Model | {model} {is_radar} |")
          print(f"| Regime | {regime} {is_fb} |")
          print(f"| Confidence | {conf} |")
          print(f"| Favored Sectors | {fav_sec} |")
          print(f"| Avoided Sectors | {avoid_sec} |")
          print(f"| Favored Regions | {fav_reg} |")
          print(f"| Avoided Regions | {avoid_reg} |")
          EOF
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # v2.1: Market Intelligence Summary
          if ls data/market_intelligence_audit/*.json 1>/dev/null 2>&1; then
            echo "### 🧠 Market Intelligence (v2.1)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json, glob
          for f in sorted(glob.glob("data/market_intelligence_audit/*.json"))[-1:]:
              with open(f) as fh:
                  data = json.load(fh)
              ai = data.get("ai_response") or {}
              regime = ai.get("regime", data.get("regime", "fallback"))
              conf = ai.get("regime_confidence", "?")
              n_adj = len(ai.get("adjustments", []))
              bs = ai.get("bond_strategy", {})
              md = data.get("market_data_input", {})
              n_fields = sum(1 for v in md.values() if v and str(v) not in ("N/A", "None", "0", "0.0"))
              print(f"| Metric | Value |")
              print(f"|--------|-------|")
              print(f"| Model | claude-opus-4 |")
              print(f"| Regime | {regime} |")
              print(f"| Confidence | {conf}/5 |")
              print(f"| Adjustments | {n_adj} |")
              print(f"| Market data fields | {n_fields}/{len(md)} |")
              print(f"| TIPS preferred | {bs.get('prefer_tips', '?')} |")
              print(f"| Avoid HY | {bs.get('avoid_hy', '?')} |")
              print(f"| Max dur Stable | {bs.get('max_duration_stable', '?')}y |")
              print(f"")
              warnings = ai.get("warnings", [])
              if warnings:
                  print(f"**Warnings:**")
                  for w in warnings:
                      print(f"- ⚠️ {w}")
          EOF
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # v4.12.0: Selection Audit Summary
          if [ -f data/selection_audit.json ]; then
            echo "### 🔍 Selection Audit (v4.12.0)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/selection_audit.json") as f:
              data = json.load(f)
          summary = data.get("summary", {})
          filters = data.get("filters_applied", [])
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Equities Initial | {summary.get('equities_initial', 0)} |")
          print(f"| Equities Selected | {summary.get('equities_selected', 0)} |")
          print(f"| Equities Rejected (Notable) | {summary.get('equities_rejected_notable', 0)} |")
          print(f"| ETF Selected | {summary.get('etf_selected', 0)} |")
          print(f"| Crypto Selected | {summary.get('crypto_selected', 0)} |")
          print(f"| Filters Applied | {len(filters)} |")
          EOF
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # v5.1.0: Selection Debug Summary (audit_collector)
          if [ -f data/selection_debug.json ]; then
            echo "### 📊 Selection Debug (v5.1.0)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/selection_debug.json") as f:
              data = json.load(f)
          meta = data.get("meta", {})
          git_sha = meta.get('git_sha', '')
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Run ID | {meta.get('run_id', 'N/A')} |")
          print(f"| Git SHA | {git_sha[:8] if git_sha else 'N/A'} |")
          print(f"| Mode | {meta.get('audit_level', 'N/A')} |")
          print(f"| Duration | {meta.get('total_duration_sec', 'N/A')}s |")
          print(f"")
          print(f"**Pipeline Stages:**")
          print(f"| Stage | Before | After | Rejected |")
          print(f"|-------|--------|-------|----------|")
          stages = data.get("pipeline_stages", {})
          for stage_name, stage_data in stages.items():
              before = stage_data.get("before", 0)
              after = stage_data.get("after", 0)
              rejected = stage_data.get("rejected", before - after)
              print(f"| {stage_name} | {before} | {after} | {rejected} |")
          EOF
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # v4.12.1: Selection Explained Summary (TOP caps by region)
          if [ -f data/selection_explained.json ]; then
            echo "### 🏆 TOP Caps Analysis (v4.12.1)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/selection_explained.json") as f:
              data = json.load(f)
          summary = data.get("summary", {})
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Total Universe | {summary.get('total_universe', 0)} |")
          print(f"| Total Selected | {summary.get('total_selected', 0)} |")
          print(f"| Selection Rate | {summary.get('selection_rate', 'N/A')} |")
          print(f"")
          print(f"**TOP 20 Caps by Region:**")
          print(f"| Region | Selected | Rejected | Rate |")
          print(f"|--------|----------|----------|------|")
          top_caps = data.get("top_caps_by_region", {})
          for region in ["US", "Europe", "Asia"]:
              if region in top_caps:
                  selected = top_caps[region].get("selected_in_top_20", 0)
                  rejected = 20 - selected
                  rate = top_caps[region].get("rejection_rate_top_20", "N/A")
                  print(f"| {region} | {selected} | {rejected} | {rate} |")
          EOF
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Global Backtest Results
          if [ -f data/backtest_results.json ]; then
            echo "### 📈 Global Backtest Comparison (90 days)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Agressif | Modéré | Stable |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
            
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/backtest_results.json") as f:
              data = json.load(f)
          comp = data.get("comparison", {})
          metrics = [
              ("Total Return %", "total_return_pct"),
              ("Sharpe Ratio", "sharpe_ratio"),
              ("Max Drawdown %", "max_drawdown_pct"),
              ("Volatility %", "volatility_pct"),
          ]
          for label, key in metrics:
              agg = comp.get("Agressif", {}).get(key, "N/A")
              mod = comp.get("Modéré", {}).get(key, "N/A")
              stb = comp.get("Stable", {}).get(key, "N/A")
              print(f"| {label} | {agg} | {mod} | {stb} |")
          EOF
          else
            echo "⚠️ Backtest skipped (TWELVE_DATA_API not configured)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # v4.9.1: Debug file summary
          if [ -f data/backtest_debug.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔍 Backtest Debug (v4.9.1)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/backtest_debug.json") as f:
              data = json.load(f)
          cov = data.get("data_coverage", {})
          n_assets = cov.get("tickers_with_data", 0)
          types = cov.get("assets_by_type", {})
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Assets documented | {n_assets} |")
          for t, count in types.items():
              print(f"| {t} | {count} |")
          EOF
          fi
          
          # EU/US Focus Portfolios Summary (v2.2)
          if [ -f data/portfolios_euus.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🇪🇺🇺🇸 EU/US Focus Portfolios (v2.2)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/portfolios_euus.json") as f:
              data = json.load(f)
          meta = data.get("_meta", {})
          blocked = meta.get("blocked_regions", ["IN", "ASIA_EX_IN", "LATAM"])
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Mode | EU/US Focus |")
          print(f"| Blocked Regions | {', '.join(blocked)} |")
          print(f"")
          print(f"| Profile | Actions | ETF | Bonds | Vol % |")
          print(f"|---------|---------|-----|-------|-------|")
          for profile in ["Agressif", "Modéré", "Stable"]:
              if profile in data:
                  n_act = len(data[profile].get("Actions", {}))
                  n_etf = len(data[profile].get("ETF", {}))
                  n_bnd = len(data[profile].get("Obligations", {}))
                  vol = data[profile].get("_optimization", {}).get("vol_realized", "N/A")
                  print(f"| {profile} | {n_act} | {n_etf} | {n_bnd} | {vol} |")
          EOF
          fi
          
          # EU/US Backtest Results
          if [ -f data/backtest_results_euus.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📈 EU/US Backtest Comparison (90 days)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Agressif | Modéré | Stable |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/backtest_results_euus.json") as f:
              data = json.load(f)
          comp = data.get("comparison", {})
          for label, key in [("Total Return %", "total_return_pct"), ("Volatility %", "volatility_pct"), ("Max Drawdown %", "max_drawdown_pct"), ("Sharpe Ratio", "sharpe_ratio")]:
              agg = comp.get("Agressif", {}).get(key, "N/A")
              mod = comp.get("Modéré", {}).get(key, "N/A")
              stb = comp.get("Stable", {}).get(key, "N/A")
              print(f"| {label} | {agg} | {mod} | {stb} |")
          EOF
          fi
          
          # v5.3.0: Lombard Ranking Summary
          if [ -f data/lombard_ranking.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💰 Lombard Ranking (v5.3.0)" >> $GITHUB_STEP_SUMMARY
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open("data/lombard_ranking.json") as f:
              data = json.load(f)
          meta = data.get("_meta", {})
          print(f"| Metric | Value |")
          print(f"|--------|-------|")
          print(f"| Universe | {meta.get('universe_size', 0)} stocks |")
          print(f"| Eligible | {meta.get('eligible_count', 0)} stocks |")
          print(f"")
          print(f"| Lombard Rate | Top N | Avg Yield | Avg Carry | Carry+ |")
          print(f"|-------------|-------|-----------|-----------|--------|")
          for rate, rdata in data.get("rankings", {}).items():
              s = rdata.get("summary", {})
              print(f"| {rate}% | {rdata.get('count', 0)} | {s.get('avg_yield', 0):.1f}% | {s.get('avg_carry_net', 0):+.1f}% | {s.get('carry_positive_count', 0)} |")
          EOF
          fi

