name: ☀️ Daily ETF/Bond Metrics

# ═══════════════════════════════════════════════════════════════════════════════
# GÈRE: Métriques quotidiennes ETF + Bonds (refresh rapide)
# SCRIPT: etf-bond-daily-metrics.js
# HORAIRES: 
#   - ☀️ AM: 09:34 Paris (après markets 09:20 + sectors 09:25)
#   - 🌅 PM: 16:00 Paris (après ouverture US)
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:

  schedule:
    # ═══════════════════════════════════════════════════════════════════════════
    # ☀️ AM REFRESH (09:34 Paris) - après markets + sectors
    # été: 07:34 UTC | hiver: 08:34 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '34 7 * * 1-5'
    - cron: '34 8 * * 1-5'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌅 PM REFRESH (16:00 Paris) - après ouverture US
    # été: 14:00 UTC | hiver: 15:00 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'

concurrency:
  group: repo-writes-global
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Gate - fenêtres élargies ±20min pour absorber délais GitHub
  # ═══════════════════════════════════════════════════════════════════════════
  gate:
    runs-on: ubuntu-latest
    outputs:
      session: ${{ steps.detect.outputs.session }}
      should_run: ${{ steps.detect.outputs.should_run }}
      
    steps:
      - name: 🕐 Detect refresh window
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PARIS=$(TZ=Europe/Paris date +%H%M)
            if [ "$PARIS" -lt "1200" ]; then
              echo "session=AM" >> $GITHUB_OUTPUT
            else
              echo "session=PM" >> $GITHUB_OUTPUT
            fi
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger"
            exit 0
          fi
          
          PARIS=$(TZ=Europe/Paris date +%H%M)
          echo "══════════════════════════════════════════════════════════════"
          echo "📍 Paris time: $PARIS"
          echo "══════════════════════════════════════════════════════════════"
          
          SESSION=""
          
          # AM refresh: 09:20 - 09:55 Paris (fenêtre élargie ±20min)
          if [ "$PARIS" -ge "0920" ] && [ "$PARIS" -le "0955" ]; then
            SESSION="AM"
            echo "☀️ AM REFRESH window detected"
            
          # PM refresh: 15:45 - 16:20 Paris (fenêtre élargie ±20min)
          elif [ "$PARIS" -ge "1545" ] && [ "$PARIS" -le "1620" ]; then
            SESSION="PM"
            echo "🌅 PM REFRESH window detected"
          fi
          
          if [ -n "$SESSION" ]; then
            echo "══════════════════════════════════════════════════════════════"
            echo "✅ Gate passed: session=$SESSION"
            echo "session=$SESSION" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "══════════════════════════════════════════════════════════════"
            echo "⏭️ Gate skipped: PARIS=$PARIS not in refresh window"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Daily Metrics - etf-bond-daily-metrics.js
  # ═══════════════════════════════════════════════════════════════════════════
  daily-metrics:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install axios csv-parse

      - name: ☀️ Run Daily Metrics
        env:
          NODE_ENV: production
          SESSION: ${{ needs.gate.outputs.session }}
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "☀️ MODE: REFRESH $SESSION (etf-bond-daily-metrics.js)"
          echo "══════════════════════════════════════════════════════════════"
          
          mkdir -p logs
          node etf-bond-daily-metrics.js 2>&1 | tee logs/daily-$(date +%Y%m%d)-$SESSION.log

      - name: 🏷️ Enrich ETF exposure (etf_exposure.py)
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🏷️ Enrichissement combined_etfs.csv (geo_bucket + sector_bucket_pill)"
          echo "══════════════════════════════════════════════════════════════"
          python3 scripts/enrich_etf_exposure.py 2>&1 | tee -a logs/daily-$(date +%Y%m%d)-$SESSION.log

      - name: 📋 Validate output
        run: |
          node -e "
            const fs = require('fs');
            const files = [
              'data/daily_metrics.json',
              'data/combined_snapshot.json'
            ];
            
            for (const file of files) {
              if (!fs.existsSync(file)) {
                console.error('❌ Missing: ' + file);
                process.exit(1);
              }
              
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const etfCount = data.etfs?.length || 0;
                const bondCount = data.bonds?.length || 0;
                console.log('✅ ' + file + ' - ETFs: ' + etfCount + ', Bonds: ' + bondCount);
              } catch (e) {
                console.error('❌ Invalid JSON in ' + file + ':', e.message);
                process.exit(1);
              }
            }
          "

      - name: 💾 Commit and push
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          
          git add data/daily_metrics.json 2>/dev/null || true
          git add data/daily_metrics_etfs.csv 2>/dev/null || true
          git add data/daily_metrics_bonds.csv 2>/dev/null || true
          git add data/combined_snapshot.json 2>/dev/null || true
          git add data/combined_etfs.csv 2>/dev/null || true
          git add data/combined_bonds.csv 2>/dev/null || true
          git add data/combined_etfs_exposure.csv 2>/dev/null || true
          git add data/combined_etfs_holdings.csv 2>/dev/null || true
          git add data/combined_bonds_holdings.csv 2>/dev/null || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ Nothing to commit"
            exit 0
          fi
          
          SESSION="${{ needs.gate.outputs.session }}"
          TS=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          if [ "$SESSION" = "AM" ]; then
            EMOJI="☀️"
          else
            EMOJI="🌅"
          fi
          
          git commit -m "$EMOJI Daily Metrics [$SESSION] - $TS [skip ci]"
          
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin && git rebase "origin/$BRANCH" || git rebase --abort || true
            git push origin "HEAD:$BRANCH" && echo "✅ Push OK" && exit 0
            sleep $((RANDOM%5+2))
          done
          exit 1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-metrics-logs-${{ needs.gate.outputs.session }}-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="⚠️ Daily Metrics Failed - $(date +'%Y-%m-%d') ${{ needs.gate.outputs.session }}"
          BODY="The daily ETF/Bond metrics workflow failed.

          **Session:** ${{ needs.gate.outputs.session }}
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')
          
          Please check the logs for more details."
          
          existing=$(gh issue list --label "workflow-failure" --state open --json title --jq ".[].title" | grep "$(date +'%Y-%m-%d')" || true)
          
          if [ -z "$existing" ]; then
            gh issue create --title "$TITLE" --body "$BODY" --label "workflow-failure,automated" || true
          fi
