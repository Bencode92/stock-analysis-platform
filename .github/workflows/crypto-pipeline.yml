name: 🪙 Crypto Data Pipeline

# ═══════════════════════════════════════════════════════════════════════════════
# GÈRE: Données et analyse crypto (volatilité, momentum)
# SCRIPTS: scripts/update-crypto-data.py + scripts/crypto-volatility-return.js
# HORAIRES: 00:00, 08:40, 14:00, 18:30 Paris
# DURÉE: ~1 minute
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if data exists'
        required: false
        default: 'false'
      vol_interval:
        description: 'Volatility calculation interval (1day or 1h)'
        required: false
        default: '1day'
      min_vol_30d:
        description: 'Minimum 30d volatility % (default: 10)'
        required: false
        default: '10'
      max_vol_30d:
        description: 'Maximum 30d volatility % (default: 500)'
        required: false
        default: '500'
      min_ret_7d:
        description: 'Minimum 7d return % (default: -50)'
        required: false
        default: '-50'

  schedule:
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌙 MINUIT (00:00 Paris)
    # été: 22:00 UTC (J-1) | hiver: 23:00 UTC (J-1)
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # ☀️ MATIN (08:40 Paris) - avant markets/sectors
    # été: 06:40 UTC | hiver: 07:40 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '40 6 * * *'
    - cron: '40 7 * * *'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌅 APRES-MIDI (14:00 Paris) - avant US open
    # été: 12:00 UTC | hiver: 13:00 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    
    # ═══════════════════════════════════════════════════════════════════════════
    # 🌆 SOIR (18:30 Paris) - après Europe close
    # été: 16:30 UTC | hiver: 17:30 UTC
    # ═══════════════════════════════════════════════════════════════════════════
    - cron: '30 16 * * *'
    - cron: '30 17 * * *'

concurrency:
  group: repo-writes-global
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Gate - fenêtres élargies à ±20 min pour absorber les délais GitHub
  # ═══════════════════════════════════════════════════════════════════════════
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      session: ${{ steps.detect.outputs.session }}
      
    steps:
      - name: 🕐 Detect if we should run
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "session=manual" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger"
            exit 0
          fi
          
          PARIS=$(TZ=Europe/Paris date +%H%M)
          echo "══════════════════════════════════════════════════════════════"
          echo "📍 Paris time: $PARIS"
          echo "══════════════════════════════════════════════════════════════"
          
          SESSION=""
          
          # Minuit: 23:45 - 00:20 Paris (fenêtre élargie)
          if [ "$PARIS" -ge "2345" ] || [ "$PARIS" -le "0020" ]; then
            SESSION="midnight"
            echo "🌙 MIDNIGHT window detected"
            
          # Matin: 08:25 - 09:00 Paris (fenêtre élargie)
          elif [ "$PARIS" -ge "0825" ] && [ "$PARIS" -le "0900" ]; then
            SESSION="morning"
            echo "☀️ MORNING window detected"
            
          # Après-midi: 13:45 - 14:20 Paris (fenêtre élargie)
          elif [ "$PARIS" -ge "1345" ] && [ "$PARIS" -le "1420" ]; then
            SESSION="afternoon"
            echo "🌅 AFTERNOON window detected"
            
          # Soir: 18:15 - 18:50 Paris (fenêtre élargie)
          elif [ "$PARIS" -ge "1815" ] && [ "$PARIS" -le "1850" ]; then
            SESSION="evening"
            echo "🌆 EVENING window detected"
          fi
          
          if [ -n "$SESSION" ]; then
            echo "✅ Gate passed: session=$SESSION"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "session=$SESSION" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Skipped: PARIS=$PARIS not in any window"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Update Crypto Data
  # ═══════════════════════════════════════════════════════════════════════════
  update-crypto-data:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      data_updated: ${{ steps.update.outputs.updated }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt || pip install requests pandas

      - name: 🪙 Update crypto data
        id: update
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update || 'false' }}
          SESSION: ${{ needs.gate.outputs.session }}
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🪙 Crypto update - Session: $SESSION"
          echo "══════════════════════════════════════════════════════════════"
          
          # Pour les runs fréquents, on skip le check des 24h
          # sauf pour minuit qui fait un refresh complet
          if [ -f "data/Crypto.csv" ] && [ "$SESSION" != "midnight" ]; then
            LAST_MODIFIED=$(date -r data/Crypto.csv +%s)
            NOW=$(date +%s)
            AGE=$((NOW - LAST_MODIFIED))
            HOURS=$((AGE / 3600))
            echo "📅 Last update: $HOURS hours ago"
            
            # Skip si moins de 4h (sauf force ou minuit)
            if [ "$FORCE_UPDATE" = "false" ] && [ $HOURS -lt 4 ]; then
              echo "⏭️ Recent data, skipping update"
              echo "updated=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          if [ -f "scripts/update-crypto-data.py" ]; then
            python scripts/update-crypto-data.py
          else
            echo "⚠️ Script not found"
          fi
          
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit updated data
        if: steps.update.outputs.updated == 'true'
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          
          git add data/Crypto.csv 2>/dev/null || true
          git add data/crypto_lists.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          SESSION="${{ needs.gate.outputs.session }}"
          TS=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          case "$SESSION" in
            midnight)  EMOJI="🌙" ;;
            morning)   EMOJI="☀️" ;;
            afternoon) EMOJI="🌅" ;;
            evening)   EMOJI="🌆" ;;
            *)         EMOJI="🪙" ;;
          esac
          
          git commit -m "$EMOJI Crypto [$SESSION] - $TS [skip ci]"
          
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin && git rebase -X theirs "origin/$BRANCH" || git rebase --abort || true
            git push origin "HEAD:$BRANCH" && echo "✅ Push OK" && exit 0
            sleep $((RANDOM%5+2))
          done
          exit 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: Analyze and Filter Cryptos
  # ═══════════════════════════════════════════════════════════════════════════
  analyze-and-filter-cryptos:
    needs: [gate, update-crypto-data]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: 📊 Run crypto volatility analysis
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API }}
          DATA_DIR: data
          OUTPUT_DIR: data/filtered
          VOL_INTERVAL: ${{ github.event.inputs.vol_interval || '1day' }}
          MIN_VOL_30D: ${{ github.event.inputs.min_vol_30d || '10' }}
          MAX_VOL_30D: ${{ github.event.inputs.max_vol_30d || '500' }}
          MIN_RET_7D: ${{ github.event.inputs.min_ret_7d || '-50' }}
          LOOKBACK_DAYS: 120
          MAX_STALE_HOURS: 48
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "📊 Analyse volatilité (interval: $VOL_INTERVAL)"
          echo "   Vol30d: $MIN_VOL_30D-$MAX_VOL_30D%, Ret7d > $MIN_RET_7D%"
          echo "══════════════════════════════════════════════════════════════"
          node scripts/crypto-volatility-return.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: crypto-analysis-${{ github.run_number }}
          path: |
            data/filtered/Crypto_filtered_volatility.csv
            data/filtered/Crypto_rejected_volatility.csv
            data/filtered/Top10_momentum.csv
            data/filtered/Top10_volatility.csv
          retention-days: 7

      - name: 💾 Commit results
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          
          git add data/filtered/*.csv 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          SESSION="${{ needs.gate.outputs.session }}"
          TS=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          case "$SESSION" in
            midnight)  EMOJI="🌙" ;;
            morning)   EMOJI="☀️" ;;
            afternoon) EMOJI="🌅" ;;
            evening)   EMOJI="🌆" ;;
            *)         EMOJI="🪙" ;;
          esac
          
          git commit -m "$EMOJI Crypto analysis [$SESSION] - $TS [skip ci]"
          
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git fetch origin && git rebase -X theirs "origin/$BRANCH" || git rebase --abort || true
            git push origin "HEAD:$BRANCH" && echo "✅ Push OK" && exit 0
            sleep $((RANDOM%5+2))
          done
          exit 1

      - name: 📋 Generate summary
        if: always()
        run: |
          echo "# 🪙 Crypto Analysis" >> $GITHUB_STEP_SUMMARY
          echo "**Session:** ${{ needs.gate.outputs.session }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/filtered/Crypto_filtered_volatility.csv" ]; then
            TOTAL=$(tail -n +2 data/Crypto.csv 2>/dev/null | wc -l || echo "0")
            ACCEPTED=$(tail -n +2 data/filtered/Crypto_filtered_volatility.csv 2>/dev/null | wc -l || echo "0")
            
            echo "## 📈 Results" >> $GITHUB_STEP_SUMMARY
            echo "- **Total:** $TOTAL cryptos" >> $GITHUB_STEP_SUMMARY
            echo "- **✅ Accepted:** $ACCEPTED cryptos" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ -f "data/filtered/Top10_momentum.csv" ]; then
              echo "### 🚀 Top 5 Momentum" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -n +2 data/filtered/Top10_momentum.csv | head -5 | \
                awk -F',' '{printf "%-12s %7s%%\n", $1, $9}' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
